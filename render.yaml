services:
  - type: web
    name: rutasegura-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    rootDir: ./backend
    healthCheckPath: /swagger
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:$PORT
      - key: ConnectionStrings__DefaultConnection
        value: Data Source=/tmp/rutasegura.db
      - key: Jwt__Issuer
        value: RutaSegura.API
      - key: Jwt__Audience
        value: RutaSegura.Client
      - key: Jwt__Key
        generateValue: true
      - key: Redis__ConnectionString
        fromVariable: REDIS_CONNECTION_STRING
      - key: FRONTEND_URL
        value: https://rutasegura-frontend.onrender.com

  - type: web
    name: rutasegura-frontend
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: VITE_GOOGLE_MAPS_API_KEY
        fromVariable: GOOGLE_MAPS_API_KEY
      - key: VITE_API_URL
        value: https://rutasegura-api.onrender.com
